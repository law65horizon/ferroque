services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ferroque
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ferroque:
    build: .
    ports: 
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@postgres:5432/ferroque
      API_KEY: ${API_KEY}
    depends_on:
      - postgres

volumes:
  postgres_data:
      
    